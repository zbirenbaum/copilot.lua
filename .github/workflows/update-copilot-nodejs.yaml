name: Update Copilot LSP

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  update_copilot_lsp:
    runs-on: ubuntu-latest
    name: Update Copilot LSP
    if: github.repository == 'zbirenbaum/copilot.lua'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create directory
        run: |
          mkdir -p copilot/js

      - name: Resolve latest semver release
        id: resolve
        run: |
          set -euo pipefail
          # GitHub's `releases/latest` endpoint sorts by created_at, so a backport
          # patch published to an older minor wins over a newer minor. Pick the
          # highest semver instead by parsing tag_name as MAJOR.MINOR.PATCH.
          tag=$(curl -fsS "https://api.github.com/repos/github/copilot-language-server-release/releases?per_page=100" \
            | jq -r '[.[] | select(.prerelease==false and .draft==false) | .tag_name]
                     | sort_by(split(".") | map(tonumber)) | last')
          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "Failed to resolve latest release tag" >&2
            exit 1
          fi
          url=$(curl -fsS "https://api.github.com/repos/github/copilot-language-server-release/releases/tags/$tag" \
            | jq -r '.assets[] | select(.name | test("copilot-language-server-js-.*\\.zip$")) | .browser_download_url')
          if [ -z "$url" ] || [ "$url" = "null" ]; then
            echo "No copilot-language-server-js asset found for $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Download latest LSP
        run: |
          set -euo pipefail
          wget -v "${{ steps.resolve.outputs.url }}"

      - name: Update version in util.lua
        run: |
          set -euo pipefail
          sed -i.bak -E "s/(version = \")[^\"]+(\",)/\1${{ steps.resolve.outputs.tag }}\2/" "lua/copilot/util.lua"
          rm lua/copilot/util.lua.bak

      - name: Unzip LSP
        run: |
          set -euo pipefail
          unzip -o copilot-language-server-js-*.zip -d copilot/js
          rm copilot-language-server-js-*.zip

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: |
            copilot/js/*
            lua/copilot/util.lua
          author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          base: master
          branch: create-pull-request/update-copilot-lsp
          commit-message: "chore: update to latest Copilot LSP"
          title: "Update Copilot LSP"
